name: deploy-prod

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build/deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - backend
          - model-api
          - rag-backend
          - telegram-bot

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          echo "Checking required Dockerfiles..."
          test -f frontend/Dockerfile || { echo "Missing frontend/Dockerfile" >&2; exit 1; }
          test -f backend/Dockerfile || { echo "Missing backend/Dockerfile" >&2; exit 1; }
          test -f model-api/Dockerfile || { echo "Missing model-api/Dockerfile" >&2; exit 1; }
          test -f rag-backend/Dockerfile || { echo "Missing rag-backend/Dockerfile" >&2; exit 1; }
          test -f telegram-bot/Dockerfile || { echo "Missing telegram-bot/Dockerfile" >&2; exit 1; }

          echo "Checking required deployment files..."
          test -f docker-compose.prod.yml || { echo "Missing docker-compose.prod.yml" >&2; exit 1; }
          test -f nginx/skinx.conf || { echo "Missing nginx/skinx.conf" >&2; exit 1; }
          test -f deploy/deploy-prod.sh || { echo "Missing deploy/deploy-prod.sh" >&2; exit 1; }
          test -f deploy/healthcheck.sh || { echo "Missing deploy/healthcheck.sh" >&2; exit 1; }

          echo "✓ All required files present"

      - name: Forbidden file scan
        run: |
          echo "Scanning for forbidden files..."

          FORBIDDEN_FOUND=0

          if find . -name ".env" -o -name ".env.local" | grep -v node_modules | grep .; then
            echo "ERROR: Found .env or .env.local files" >&2
            FORBIDDEN_FOUND=1
          fi

          if find . -name "*.pt" -o -name "*.pth" -o -name "*.safetensors" | grep -v "_local_only_models" | grep -v "_archive_review" | grep .; then
            echo "ERROR: Found model weight files" >&2
            FORBIDDEN_FOUND=1
          fi

          if find . -path "*/node_modules" -prune -o -path "*/dist" -prune -o -path "*/build" -prune | grep -E "(node_modules|dist|build)$" | grep -v "^./"; then
            echo "WARNING: Found build artifacts in source"
          fi

          if test -d "_local_only_models" && git ls-files _local_only_models | grep .; then
            echo "ERROR: _local_only_models directory is tracked in git" >&2
            FORBIDDEN_FOUND=1
          fi

          if test -d "_archive_review" && git ls-files _archive_review | grep .; then
            echo "ERROR: _archive_review directory is tracked in git" >&2
            FORBIDDEN_FOUND=1
          fi

          if [ $FORBIDDEN_FOUND -eq 1 ]; then
            echo "Forbidden files found - failing validation" >&2
            exit 1
          fi

          echo "✓ No forbidden files found"

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        if: github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-frontend:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_TURNSTILE_SITE_KEY=${{ vars.VITE_TURNSTILE_SITE_KEY }}
            VITE_API_BASE_URL=https://skin-x.app
            VITE_AUTH0_DOMAIN=${{ vars.VITE_AUTH0_DOMAIN }}
            VITE_AUTH0_CLIENT_ID=${{ vars.VITE_AUTH0_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ vars.VITE_AUTH0_AUDIENCE }}

      - name: Build and push backend
        if: github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-backend:${{ env.IMAGE_TAG }}

      - name: Build and push model-api
        if: github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'model-api'
        uses: docker/build-push-action@v6
        with:
          context: ./model-api
          file: ./model-api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-model-api:${{ env.IMAGE_TAG }}

      - name: Build and push rag-backend
        if: github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'rag-backend'
        uses: docker/build-push-action@v6
        with:
          context: ./rag-backend
          file: ./rag-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-rag-backend:${{ env.IMAGE_TAG }}

      - name: Build and push telegram-bot
        if: github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == 'telegram-bot'
        uses: docker/build-push-action@v6
        with:
          context: ./telegram-bot
          file: ./telegram-bot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-telegram-bot:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment files via rsync
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".venv" \
            --exclude "venv" \
            --exclude "_local_only_models" \
            --exclude "_archive_review" \
            --exclude "dist" \
            --exclude "build" \
            --exclude ".env" \
            --exclude ".env.local" \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            ./ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/skinx/app/"

      - name: Run production deploy script
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /var/www/skinx/app && \
             DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' \
             IMAGE_TAG='${{ github.sha }}' \
             PROD_DOMAIN='${{ vars.PROD_DOMAIN }}' \
             DEPLOY_SERVICE='${{ github.event.inputs.service }}' \
             bash deploy/deploy-prod.sh"
