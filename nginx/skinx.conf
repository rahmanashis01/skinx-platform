# ═══════════════════════════════════════════════════════════════════════════
# SkinX Platform - Production Nginx Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════════════════════
#
# Domain: skin-x.app, www.skin-x.app
#
# This configuration handles reverse proxying to Docker containers running
# on localhost. SSL/TLS will be configured later via Certbot.
#
# INSTALL:
#   sudo cp nginx/skinx.conf /etc/nginx/sites-available/skinx.conf
#   sudo ln -sf /etc/nginx/sites-available/skinx.conf /etc/nginx/sites-enabled/skinx.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL (after DNS is configured):
#   sudo certbot --nginx -d skin-x.app -d www.skin-x.app
#
# FRONTEND STATIC SERVING:
#   Frontend build artifacts are copied to /var/www/skinx/frontend-static
#   Nginx serves these files directly instead of proxying through container.
#   This eliminates ERR_CONTENT_LENGTH_MISMATCH errors on asset loading.
#   deploy-prod.sh refreshes this directory on frontend/all deployments.
#
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# WebSocket Support
# ───────────────────────────────────────────────────────────────────────────
# NOTE: Place this map in /etc/nginx/nginx.conf http block if not already present
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     '' close;
# }

# ───────────────────────────────────────────────────────────────────────────
# Main Server Block - HTTP (Port 80)
# ───────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    server_name skin-x.app www.skin-x.app;

    # Hide nginx version for security
    server_tokens off;

    # ───────────────────────────────────────────────────────────────────────
    # Global Settings
    # ───────────────────────────────────────────────────────────────────────

    # Maximum upload size (for image uploads)
    client_max_body_size 25M;

    # Timeout settings for ML inference endpoints
    proxy_read_timeout 120s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    send_timeout 120s;

    # ───────────────────────────────────────────────────────────────────────
    # Security Headers
    # ───────────────────────────────────────────────────────────────────────

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CSP will be added later after verifying Auth0 and Cloudflare domains
    # add_header Content-Security-Policy "default-src 'self';" always;

    # ───────────────────────────────────────────────────────────────────────
    # BLOCK Internal/Debug Routes (Return 404)
    # ───────────────────────────────────────────────────────────────────────

    # Block debug routes
    location ^~ /debug/ {
        return 404;
    }

    location = /debug/config {
        return 404;
    }

    location = /debug/models {
        return 404;
    }

    # Block direct access to internal services
    location ^~ /model-api/ {
        return 404;
    }

    location ^~ /rag-backend/ {
        return 404;
    }

    # Block direct analyze endpoints (backend calls model-api internally)
    location ^~ /analyze/ {
        return 404;
    }

    location = /predict {
        return 404;
    }

    # ───────────────────────────────────────────────────────────────────────
    # PUBLIC Routes - Backend API
    # ───────────────────────────────────────────────────────────────────────

    # Backend API endpoints (POST /api/analyze, etc.)
    # Hardened for file uploads and long-running inference requests
    location /api/ {
        proxy_pass http://127.0.0.1:5001;

        # Upload and timeout configuration
        client_max_body_size 25M;
        client_body_buffer_size 25M;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # Disable buffering for real-time responses and efficient uploads
        proxy_buffering off;
        proxy_request_buffering off;

        # Clear connection header to avoid issues with keep-alive
        proxy_set_header Connection "";
    }

    # Auth routes (if backend handles authentication)
    location /auth/ {
        proxy_pass http://127.0.0.1:5001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Uploaded images/files served by backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:5001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Health check endpoint
    location = /health {
        proxy_pass http://127.0.0.1:5001/health;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # Allow from anywhere for monitoring
        access_log off;
    }

    # ───────────────────────────────────────────────────────────────────────
    # PUBLIC Routes - Telegram Bot Webhook
    # ───────────────────────────────────────────────────────────────────────

    # Telegram webhook endpoint (exact match)
    location = /telegram/webhook {
        proxy_pass http://127.0.0.1:5050/telegram/webhook;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # Only allow POST from Telegram servers
        limit_except POST {
            deny all;
        }
    }

    # Block all other Telegram routes from public access
    location /telegram/ {
        return 404;
    }

    # ───────────────────────────────────────────────────────────────────────
    # PUBLIC Routes - Frontend Static Assets
    # ───────────────────────────────────────────────────────────────────────

    # Static assets with aggressive caching
    # These are built files with hash-based filenames (immutable)
    location /assets/ {
        root /var/www/skinx/frontend-static;
        add_header Cache-Control "public, immutable";
        expires 1y;
        add_header Accept-Ranges "none" always;
    }

    # Frontend React SPA - Serve from host static directory
    # This eliminates proxy errors from container and enables reliable asset delivery
    location / {
        root /var/www/skinx/frontend-static;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ───────────────────────────────────────────────────────────────────────
    # Error Pages
    # ───────────────────────────────────────────────────────────────────────

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ═══════════════════════════════════════════════════════════════════════════
# Architecture Notes
# ═══════════════════════════════════════════════════════════════════════════
#
# PUBLIC ACCESS FLOW:
#   Internet → Cloudflare → Nginx (this config) → Docker containers or static files
#
# FRONTEND SERVING:
#   Nginx serves static files directly from /var/www/skinx/frontend-static
#   This directory is populated by deploy-prod.sh during frontend/all deployments
#   Benefits: Faster, no proxy overhead, no ERR_CONTENT_LENGTH_MISMATCH
#
# INTERNAL SERVICE CALLS (NOT PROXIED BY NGINX):
#   Backend → Model-API:     http://model-api:8080 (Docker network)
#   Backend → RAG-Backend:   http://rag-backend:8000 (Docker network)
#   Telegram → Model-API:    http://model-api:8080 (Docker network)
#   Telegram → Backend:      http://backend:5001 (Docker network)
#
# BLOCKED ROUTES (404):
#   /debug/*           - Debug endpoints
#   /model-api/*       - ML inference service (internal only)
#   /rag-backend/*     - RAG service (internal only)
#   /analyze/*         - Direct analyze endpoints (use /api/analyze instead)
#   /predict           - Direct prediction endpoint
#
# DOCKER CONTAINER BINDINGS:
#   Frontend:      127.0.0.1:3000  (Nginx serving React build - used only as source)
#   Backend:       127.0.0.1:5001  (Node.js/Express API)
#   Model-API:     127.0.0.1:8080  (NOT publicly exposed)
#   RAG-Backend:   127.0.0.1:8000  (NOT publicly exposed)
#   Telegram-Bot:  127.0.0.1:5050  (Only /telegram/webhook exposed)
#
# CLOUDFLARE CONSIDERATIONS:
#   - DNS A record: skin-x.app → VPS IP
#   - Bypass Cloudflare challenge for: /telegram/webhook
#   - Consider bypassing for: /api/* (if upload challenges occur)
#
# SSL/TLS:
#   After DNS configuration, run:
#   sudo certbot --nginx -d skin-x.app -d www.skin-x.app
#
#   Certbot will automatically modify this file to add SSL configuration.
#
# ═══════════════════════════════════════════════════════════════════════════
