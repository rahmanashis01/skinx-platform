name: deploy-prod

on:
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-frontend:${{ env.IMAGE_TAG }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-backend:${{ env.IMAGE_TAG }}

      - name: Build and push model-api
        uses: docker/build-push-action@v6
        with:
          context: ./model-api
          file: ./model-api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-model-api:${{ env.IMAGE_TAG }}

      - name: Build and push rag-backend
        uses: docker/build-push-action@v6
        with:
          context: ./rag-backend
          file: ./rag-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-rag-backend:${{ env.IMAGE_TAG }}

      - name: Build and push telegram-bot
        uses: docker/build-push-action@v6
        with:
          context: ./telegram-bot
          file: ./telegram-bot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skinx-telegram-bot:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".venv" \
            --exclude "venv" \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            ./ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/skinx/skinx_platform/"

      - name: Run production deploy script
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /var/www/skinx/skinx_platform && DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' IMAGE_TAG='${{ env.IMAGE_TAG }}' bash deploy/deploy-prod.sh"
