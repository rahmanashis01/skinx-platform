<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="/logo.png" />
        <link rel="manifest" href="/manifest.webmanifest" />
        <meta name="theme-color" content="#1e3a8a" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="SkinX" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <link rel="apple-touch-icon" href="/icons/icon-192.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SkinX – Skin Cancer Detection</title>
        <style>
            #loading-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Arial,
                    sans-serif;
            }
            .loader {
                width: 50px;
                height: 50px;
                border: 5px solid rgba(255, 255, 255, 0.3);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .loading-text {
                color: #fff;
                font-size: 18px;
                font-weight: 600;
                margin-top: 20px;
            }
            .loading-subtext {
                color: rgba(255, 255, 255, 0.8);
                font-size: 14px;
                margin-top: 10px;
            }
            #error-screen {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                padding: 20px;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Arial,
                    sans-serif;
            }
            .error-container {
                max-width: 500px;
                margin: 50px auto;
                background: rgba(255, 255, 255, 0.95);
                border-radius: 20px;
                padding: 40px;
                text-align: center;
            }
            .error-icon {
                font-size: 60px;
                margin-bottom: 20px;
            }
            .error-title {
                font-size: 24px;
                font-weight: bold;
                color: #1a202c;
                margin-bottom: 10px;
            }
            .error-message {
                font-size: 16px;
                color: #4a5568;
                margin-bottom: 20px;
                line-height: 1.6;
            }
            .error-btn {
                display: inline-block;
                padding: 12px 24px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: #fff;
                text-decoration: none;
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                border: none;
                font-size: 16px;
            }
        </style>
    </head>
    <body>
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loader"></div>
            <div class="loading-text">Loading SkinX...</div>
            <div class="loading-subtext">Please wait</div>
        </div>

        <!-- Error Screen (hidden by default) -->
        <div id="error-screen">
            <div class="error-container">
                <div class="error-icon">⚠️</div>
                <div class="error-title">Failed to Load</div>
                <div class="error-message">
                    We're having trouble loading the application. Please check
                    your connection and try again.
                </div>
                <button class="error-btn" onclick="location.reload()">
                    Reload Page
                </button>
            </div>
        </div>

        <!-- React Root -->
        <div id="root"></div>

        <script>
            // Hide loading screen once React app mounts
            const observer = new MutationObserver(() => {
                const root = document.getElementById("root");
                if (root && root.children.length > 0) {
                    const loadingScreen =
                        document.getElementById("loading-screen");
                    if (loadingScreen) {
                        loadingScreen.style.opacity = "0";
                        loadingScreen.style.transition = "opacity 0.3s";
                        setTimeout(() => loadingScreen.remove(), 300);
                    }
                    observer.disconnect();
                }
            });
            observer.observe(document.getElementById("root"), {
                childList: true,
                subtree: true,
            });

            // Show error if app doesn't load within 15 seconds
            setTimeout(() => {
                const root = document.getElementById("root");
                if (!root || root.children.length === 0) {
                    document.getElementById("loading-screen").style.display =
                        "none";
                    document.getElementById("error-screen").style.display =
                        "block";
                }
            }, 15000);

            // Catch script loading errors
            window.addEventListener("error", (e) => {
                if (e.filename && e.filename.includes("/src/")) {
                    console.error("Script loading error:", e);
                    setTimeout(() => {
                        const root = document.getElementById("root");
                        if (!root || root.children.length === 0) {
                            document.getElementById(
                                "loading-screen",
                            ).style.display = "none";
                            document.getElementById(
                                "error-screen",
                            ).style.display = "block";
                        }
                    }, 1000);
                }
            });
        </script>

        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
