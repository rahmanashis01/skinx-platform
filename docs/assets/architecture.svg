<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">SkinX production architecture</title>
  <desc id="desc">Architecture diagram showing browser, frontend, nginx, backend, PostgreSQL, model API, RAG backend, and Telegram bot.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .canvas { fill: #f8fbff; }
      .title { fill: #0f172a; font: 700 34px Arial, Helvetica, sans-serif; }
      .subtitle { fill: #475569; font: 500 16px Arial, Helvetica, sans-serif; }
      .box { fill: #ffffff; stroke: #bfdbfe; stroke-width: 2; rx: 18; }
      .primary { fill: url(#header); stroke: #1d4ed8; }
      .label { fill: #0f172a; font: 700 20px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .small { fill: #475569; font: 500 14px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .primaryText { fill: #ffffff; font: 700 20px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .primarySmall { fill: #dbeafe; font: 500 14px Arial, Helvetica, sans-serif; text-anchor: middle; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .softLine { stroke: #38bdf8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="canvas" width="1200" height="760" rx="28"/>
  <text class="title" x="600" y="58" text-anchor="middle">SkinX Production Architecture</text>
  <text class="subtitle" x="600" y="88" text-anchor="middle">Cloud APIs shared by the web app, PWA clients, Telegram bot, model service, and RAG assistant</text>

  <rect class="box" x="430" y="125" width="340" height="78"/>
  <text class="label" x="600" y="158">User Browser / PWA</text>
  <text class="small" x="600" y="181">Desktop and mobile web clients</text>

  <path class="line" d="M600 203 L600 245"/>

  <rect class="box" x="430" y="245" width="340" height="78"/>
  <text class="label" x="600" y="278">React + Vite Frontend</text>
  <text class="small" x="600" y="301">SkinX application UI</text>

  <path class="line" d="M600 323 L600 365"/>

  <rect class="box" x="430" y="365" width="340" height="78"/>
  <text class="label" x="600" y="398">Nginx Reverse Proxy</text>
  <text class="small" x="600" y="421">TLS, routing, webhooks</text>

  <path class="line" d="M600 443 L600 485"/>

  <rect class="primary" x="430" y="485" width="340" height="82" rx="18"/>
  <text class="primaryText" x="600" y="519">Node.js Backend API</text>
  <text class="primarySmall" x="600" y="543">Auth, sessions, scans, reports</text>

  <path class="line" d="M600 567 L600 619"/>

  <rect class="box" x="430" y="619" width="340" height="78"/>
  <text class="label" x="600" y="652">PostgreSQL</text>
  <text class="small" x="600" y="675">Persistent users and auth state</text>

  <path class="softLine" d="M430 526 C340 526 320 290 255 290"/>
  <rect class="box" x="60" y="250" width="260" height="82"/>
  <text class="label" x="190" y="283">Telegram Bot</text>
  <text class="small" x="190" y="306">Webhook access for /ask and /scan</text>

  <path class="softLine" d="M430 526 C350 526 340 610 284 610"/>
  <rect class="box" x="54" y="570" width="260" height="82"/>
  <text class="label" x="184" y="603">Model API</text>
  <text class="small" x="184" y="626">FastAPI / PyTorch screening</text>

  <path class="softLine" d="M770 526 C850 526 860 610 916 610"/>
  <rect class="box" x="886" y="570" width="260" height="82"/>
  <text class="label" x="1016" y="603">RAG Backend</text>
  <text class="small" x="1016" y="626">ChromaDB + OpenRouter guidance</text>

  <path class="softLine" d="M770 526 C860 526 880 290 945 290"/>
  <rect class="box" x="880" y="250" width="260" height="82"/>
  <text class="label" x="1010" y="283">Shared Clients</text>
  <text class="small" x="1010" y="306">Future Android and partner apps</text>
</svg>
